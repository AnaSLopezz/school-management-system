<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sistema Escolar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f9; color: #1e293b; }

    body.rol-admin, body.rol-profesor, body.rol-estudiante {
      --color-header: #1a56a0;
      --color-sidebar: #0d3b7a;
      --color-accent:  #1a56a0;
    }

    @keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .panel.active { animation: fadeIn 0.25s ease; }
    .stat-card    { animation: fadeIn 0.3s ease; }
    .materia-card { animation: fadeIn 0.3s ease; }
    .tarea-card   { animation: fadeIn 0.3s ease; }

    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 60px; background: var(--color-header, #1a56a0);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: background 0.4s ease;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .menu-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 6px; display: flex; flex-direction: column; gap: 4px; }
    .menu-btn span { display: block; width: 18px; height: 2px; background: white; border-radius: 2px; transition: all 0.2s; }
    .logo { display: flex; align-items: center; gap: 8px; color: white; font-size: 15px; font-weight: 600; }
    .logo svg { width: 20px; height: 20px; fill: white; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .notif-wrap { position: relative; cursor: pointer; }
    .notif-wrap svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.8); }
    .notif-badge { position: absolute; top: -4px; right: -4px; background: #ef4444; color: white; font-size: 9px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .user-chip { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 34px; height: 34px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 600; }
    .user-info-text { line-height: 1.3; }
    .user-name { font-size: 13px; font-weight: 500; color: white; }
    .user-role { font-size: 10px; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: 0.05em; }
    .btn-logout { padding: 6px 14px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 6px; color: white; font-size: 12px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    .layout { display: flex; padding-top: 60px; min-height: 100vh; }

    .sidebar {
      position: fixed; top: 60px; left: 0; bottom: 0;
      width: 220px; background: var(--color-sidebar, #0d3b7a);
      padding: 16px 10px; overflow-y: auto;
      transition: transform 0.3s, background 0.4s ease;
      z-index: 50;
    }
    .sidebar.hidden { transform: translateX(-220px); }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 49; }
    .sidebar-overlay.visible { display: block; }
    .nav-section { margin-bottom: 20px; }
    .nav-section-title { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; padding: 0 8px; margin-bottom: 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; border: none; background: none; width: 100%; text-align: left; transition: all 0.15s; margin-bottom: 2px; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: white; }
    .nav-item svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

    .main { flex: 1; margin-left: 220px; padding: 24px; transition: margin 0.3s; min-height: calc(100vh - 60px); }
    .main.full { margin-left: 0; }

    .panel { display: none; }
    .panel.active { display: block; }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h1 { font-size: 20px; font-weight: 600; color: #1e293b; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 12px; padding: 18px; border: 1px solid #e8eef5; display: flex; align-items: center; gap: 14px; transition: transform 0.2s, box-shadow 0.2s; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .stat-icon { width: 46px; height: 46px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .stat-icon svg { width: 22px; height: 22px; }
    .stat-icon.blue   { background: #dbeafe; } .stat-icon.blue svg   { fill: #1a56a0; }
    .stat-icon.green  { background: #dcfce7; } .stat-icon.green svg  { fill: #166534; }
    .stat-icon.amber  { background: #fef3c7; } .stat-icon.amber svg  { fill: #92400e; }
    .stat-icon.purple { background: #ede9fe; } .stat-icon.purple svg { fill: #5b21b6; }
    .stat-icon.red    { background: #fee2e2; } .stat-icon.red svg    { fill: #991b1b; }
    .stat-val { font-size: 26px; font-weight: 700; color: #1e293b; line-height: 1; }
    .stat-lbl { font-size: 12px; color: #64748b; margin-top: 3px; }

    .table-wrap { background: white; border-radius: 12px; border: 1px solid #e8eef5; overflow: hidden; }
    .table-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; gap: 12px; flex-wrap: wrap; }
    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; fill: #94a3b8; pointer-events: none; }
    .search-input { padding: 7px 12px 7px 32px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; outline: none; width: 220px; background: #f8fafc; transition: all 0.2s; }
    .search-input:focus { border-color: var(--color-accent, #1a56a0); background: white; box-shadow: 0 0 0 3px rgba(26,86,160,0.08); }
    .table-info { font-size: 12px; color: #94a3b8; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8fafc; }
    th { padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #f1f5f9; cursor: pointer; user-select: none; white-space: nowrap; }
    th:hover { color: var(--color-accent, #1a56a0); }
    th.sorted-asc::after  { content: ' ↑'; color: var(--color-accent, #1a56a0); }
    th.sorted-desc::after { content: ' ↓'; color: var(--color-accent, #1a56a0); }
    td { padding: 12px 16px; font-size: 13px; color: #334155; border-bottom: 1px solid #f8fafc; }
    tbody tr:hover { background: #f8fafc; }
    tbody tr:last-child td { border-bottom: none; }
    .empty-td { text-align: center; color: #94a3b8; font-style: italic; padding: 32px !important; }

    .pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid #f1f5f9; }
    .page-info { font-size: 12px; color: #94a3b8; }
    .page-btns { display: flex; gap: 4px; }
    .page-btn { padding: 5px 10px; border: 1px solid #e2e8f0; border-radius: 6px; background: white; font-size: 12px; cursor: pointer; transition: all 0.15s; color: #475569; }
    .page-btn:hover { border-color: var(--color-accent, #1a56a0); color: var(--color-accent, #1a56a0); }
    .page-btn.active { background: var(--color-accent, #1a56a0); color: white; border-color: var(--color-accent, #1a56a0); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-admin      { background: #dbeafe; color: #1e40af; }
    .badge-profesor   { background: #dcfce7; color: #166534; }
    .badge-estudiante { background: #ede9fe; color: #5b21b6; }
    .badge-activo     { background: #dcfce7; color: #166534; }
    .badge-inactivo   { background: #fee2e2; color: #991b1b; }
    .badge-pendiente  { background: #fef3c7; color: #92400e; }
    .badge-entregada  { background: #dcfce7; color: #166534; }
    .badge-vencida    { background: #fee2e2; color: #991b1b; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary   { background: var(--color-accent, #1a56a0); color: white; }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-danger  { background: #fee2e2; color: #991b1b; }
    .btn-danger:hover { background: #fecaca; }
    .btn-share   { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .btn-share:hover { background: #dcfce7; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    .filtros { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filtro-btn { padding: 6px 14px; border: 1.5px solid #e2e8f0; border-radius: 20px; background: white; font-size: 12px; font-weight: 500; color: #64748b; cursor: pointer; transition: all 0.15s; }
    .filtro-btn.active, .filtro-btn:hover { border-color: var(--color-accent, #1a56a0); color: var(--color-accent, #1a56a0); background: #eff6ff; }

    .materias-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .materia-card { background: white; border-radius: 12px; border: 1px solid #e8eef5; border-left: 4px solid var(--color-accent, #1a56a0); padding: 18px; transition: transform 0.2s, box-shadow 0.2s; }
    .materia-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .materia-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .materia-card .profe { font-size: 12px; color: #64748b; margin-bottom: 12px; }
    .materia-card .acciones { display: flex; gap: 6px; flex-wrap: wrap; }

    .tarea-card { background: white; border-radius: 12px; border: 1px solid #e8eef5; padding: 16px 18px; margin-bottom: 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; transition: transform 0.2s, box-shadow 0.2s; }
    .tarea-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .tarea-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .tarea-card p { font-size: 12px; color: #64748b; }
    .tarea-meta { font-size: 11px; color: #94a3b8; margin-top: 6px; }
    .tarea-acciones { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }

    .mensajes-layout { display: grid; grid-template-columns: 300px 1fr; gap: 14px; height: 520px; }
    .mensajes-lista { background: white; border-radius: 12px; border: 1px solid #e8eef5; overflow-y: auto; }
    .msg-item { padding: 14px 16px; border-bottom: 1px solid #f8fafc; cursor: pointer; transition: background 0.15s; }
    .msg-item:hover { background: #f8fafc; }
    .msg-item.active { background: #eff6ff; }
    .msg-item.unread { border-left: 3px solid var(--color-accent, #1a56a0); }
    .msg-item h5 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .msg-item p { font-size: 12px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-time { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .mensaje-detalle { background: white; border-radius: 12px; border: 1px solid #e8eef5; padding: 24px; overflow-y: auto; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #94a3b8; gap: 12px; }
    .empty-state svg { width: 48px; height: 48px; fill: #cbd5e1; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #1e293b; background: white; outline: none; transition: border-color 0.2s; font-family: inherit; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--color-accent, #1a56a0); box-shadow: 0 0 0 3px rgba(26,86,160,0.08); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(15,30,60,0.45); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .modal { background: white; border-radius: 14px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: fadeIn 0.2s ease; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid #f1f5f9; }
    .modal-header h3 { font-size: 15px; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 18px; color: #94a3b8; cursor: pointer; padding: 4px; border-radius: 4px; line-height: 1; }
    .modal-close:hover { color: #475569; background: #f1f5f9; }
    .modal-body { padding: 20px; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    .horario-wrap { background: white; border-radius: 12px; border: 1px solid #e8eef5; overflow: hidden; }
    .horario-grid { display: grid; grid-template-columns: 90px repeat(5, 1fr); }
    .horario-header { background: var(--color-accent, #1a56a0); color: white; padding: 10px; text-align: center; font-size: 12px; font-weight: 600; border-right: 1px solid rgba(255,255,255,0.1); }
    .horario-hora { background: #f8fafc; padding: 10px; text-align: center; font-size: 11px; font-weight: 600; color: #64748b; border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
    .horario-celda { padding: 8px; border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; font-size: 11px; min-height: 50px; }
    .horario-celda.ocupada { background: #eff6ff; color: var(--color-accent, #1a56a0); font-weight: 500; }

    .nota-alta  { color: #166534; font-weight: 600; }
    .nota-media { color: #92400e; font-weight: 600; }
    .nota-baja  { color: #991b1b; font-weight: 600; }

    .share-box { background: #f8fafc; border: 1.5px dashed #cbd5e1; border-radius: 10px; padding: 14px; display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .share-link { flex: 1; font-size: 12px; color: #64748b; word-break: break-all; }
    .btn-copy { padding: 6px 12px; background: var(--color-accent, #1a56a0); color: white; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .btn-copy:hover { filter: brightness(1.1); }
    .btn-copy.copied { background: #166534; }

    #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 300; }
    .toast { padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; color: white; min-width: 260px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); animation: toastIn 0.3s ease; }
    .toast.success { background: #166534; }
    .toast.error   { background: #991b1b; }
    .toast.warning { background: #92400e; }

    .hidden { display: none !important; }
    .mt-4 { margin-top: 16px; }
    .mb-3 { margin-bottom: 12px; }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .header { padding: 0 12px; }
      .logo span.logo-text { display: none; }
      .user-info-text { display: none; }
      .btn-logout { padding: 5px 10px; font-size: 11px; }

      .sidebar { transform: translateX(-220px); }
      .sidebar.visible { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,0.2); }

      .main { margin-left: 0; padding: 16px; }

      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card { padding: 14px; }
      .stat-val { font-size: 22px; }
      .stat-icon { width: 38px; height: 38px; }
      .stat-icon svg { width: 18px; height: 18px; }

      .materias-grid { grid-template-columns: 1fr; }

      .mensajes-layout { grid-template-columns: 1fr; height: auto; }
      .mensajes-lista { max-height: 300px; }

      .table-wrap { overflow-x: auto; }
      table { min-width: 500px; }
      .search-input { width: 160px; }

      .tarea-card { flex-direction: column; align-items: flex-start; }
      .tarea-acciones { flex-direction: row; flex-wrap: wrap; width: 100%; }

      .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }

      .horario-wrap { overflow-x: auto; }
      .horario-grid { min-width: 500px; }

      .filtros { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; }
      .filtro-btn { white-space: nowrap; }

      .modal { width: 95%; max-height: 85vh; }
    }

    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: 1fr; }
      .header-right { gap: 8px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="menu-btn" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
      <span class="logo-text">Sistema Escolar</span>
    </div>
  </div>
  <div class="header-right">
    <div class="notif-wrap" onclick="mostrarPanel('mensajes')">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <div class="notif-badge hidden" id="notif-count">0</div>
    </div>
    <div class="user-chip">
      <div class="user-avatar" id="user-avatar">U</div>
      <div class="user-info-text">
        <div class="user-name" id="header-nombre">Cargando...</div>
        <div class="user-role" id="header-rol">...</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav id="menu-items"></nav>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <main class="main" id="main-content">

    <div id="panel-inicio" class="panel active">
      <div class="page-header">
        <div>
          <h1>Bienvenido, <span id="welcome-nombre"></span></h1>
          <p id="welcome-msg" style="font-size:13px;color:#64748b;margin-top:2px"></p>
        </div>
      </div>
      <div id="stats-cards" class="stats-grid"></div>
    </div>

    <div id="panel-usuarios" class="panel">
      <div class="page-header">
        <h1>Usuarios</h1>
        <button class="btn btn-primary" onclick="abrirModalCrearUsuario()">+ Nuevo Usuario</button>
      </div>
      <div class="filtros">
        <button class="filtro-btn active" onclick="filtrarUsuarios('todos', this)">Todos</button>
        <button class="filtro-btn" onclick="filtrarUsuarios('estudiante', this)">Estudiantes</button>
        <button class="filtro-btn" onclick="filtrarUsuarios('profesor', this)">Profesores</button>
        <button class="filtro-btn" onclick="filtrarUsuarios('admin', this)">Admins</button>
      </div>
      <div id="tabla-usuarios-container"></div>
    </div>

    <div id="panel-materias" class="panel">
      <div class="page-header">
        <h1>Materias</h1>
        <button class="btn btn-primary" id="btn-nueva-materia" onclick="abrirModalCrearMateria()">+ Nueva Materia</button>
      </div>
      <div class="materias-grid" id="materias-grid"></div>
    </div>

    <div id="panel-notas" class="panel">
      <div class="page-header"><h1>Gestión de Notas</h1></div>
      <div class="form-group" style="max-width:320px">
        <label>Seleccionar Materia</label>
        <select id="select-materia-notas" onchange="cargarEstudiantesNotas()">
          <option value="">-- Selecciona una materia --</option>
        </select>
      </div>
      <div id="tabla-notas-container" class="hidden">
        <button class="btn btn-primary mb-3" onclick="abrirModalAgregarNota()">+ Agregar Nota</button>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Estudiante</th><th>Descripción</th><th>Nota</th>
                <th>Máximo</th><th>Fecha</th><th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody-notas"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="panel-tareas" class="panel">
      <div class="page-header">
        <h1>Tareas</h1>
        <button class="btn btn-primary" id="btn-crear-tarea" onclick="abrirModalCrearTarea()">+ Nueva Tarea</button>
      </div>
      <div id="tareas-lista"></div>
    </div>

    <div id="panel-mensajes" class="panel">
      <div class="page-header">
        <h1>Mensajes</h1>
        <button class="btn btn-primary" onclick="abrirModalNuevoMensaje()">+ Nuevo Mensaje</button>
      </div>
      <div class="mensajes-layout">
        <div class="mensajes-lista" id="mensajes-lista"></div>
        <div class="mensaje-detalle" id="mensaje-detalle">
          <div class="empty-state">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            <p>Selecciona un mensaje para leerlo</p>
          </div>
        </div>
      </div>
    </div>

    <div id="panel-mis-notas" class="panel">
      <div class="page-header"><h1>Mis Calificaciones</h1></div>
      <div id="promedios-cards" class="stats-grid"></div>
      <div class="table-wrap mt-4">
        <table>
          <thead>
            <tr>
              <th>Materia</th><th>Descripción</th><th>Nota</th>
              <th>Máximo</th><th>Porcentaje</th><th>Fecha</th>
            </tr>
          </thead>
          <tbody id="tbody-mis-notas"></tbody>
        </table>
      </div>
    </div>

    <div id="panel-mis-tareas" class="panel">
      <div class="page-header"><h1>Mis Tareas</h1></div>
      <div id="mis-tareas-lista"></div>
    </div>

    <div id="panel-horario" class="panel">
      <div class="page-header"><h1>Mi Horario</h1></div>
      <div id="horario-contenido"></div>
    </div>

  </main>
</div>

<div id="modal-overlay" class="modal-overlay hidden" onclick="cerrarModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-titulo"></h3>
      <button class="modal-close" onclick="cerrarModal()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/dashboard.js"></script>
<script src="js/admin.js"></script>
